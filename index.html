<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A modern neon-themed Snake Game built with HTML5 Canvas, CSS3, and vanilla JavaScript. Features smooth animations, sound effects, and responsive design." />
  <title>🐍 Neon Snake Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Animated background particles -->
  <div id="particles"></div>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1 class="title">NEON <span class="highlight">SNAKE</span></h1>
      <p class="subtitle">Use arrow keys or swipe to control the snake</p>
    </header>

    <!-- Score Panel -->
    <div class="score-panel">
      <div class="score-box">
        <span class="score-label">SCORE</span>
        <span class="score-value" id="score">0</span>
      </div>
      <div class="score-box high">
        <span class="score-label">HIGH SCORE</span>
        <span class="score-value" id="highScore">0</span>
      </div>
      <div class="score-box">
        <span class="score-label">LEVEL</span>
        <span class="score-value" id="level">1</span>
      </div>
    </div>

    <!-- Game Canvas Wrapper -->
    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>

      <!-- Overlay Screens -->
      <div class="overlay" id="startOverlay">
        <div class="overlay-content">
          <h2>🐍 NEON SNAKE</h2>
          <p>Eat the glowing orbs to grow.<br/>Avoid walls and yourself!</p>
          <button class="btn btn-start" id="startBtn" onclick="game.start()">
            ▶ START GAME
          </button>
        </div>
      </div>

      <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-content game-over">
          <h2>💀 GAME OVER</h2>
          <p class="final-score">Score: <span id="finalScore">0</span></p>
          <p class="final-high">Best: <span id="finalHigh">0</span></p>
          <button class="btn btn-restart" onclick="game.restart()">
            🔄 PLAY AGAIN
          </button>
        </div>
      </div>

      <div class="overlay hidden" id="pauseOverlay">
        <div class="overlay-content">
          <h2>⏸️ PAUSED</h2>
          <button class="btn btn-start" onclick="game.resume()">
            ▶ RESUME
          </button>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-ctrl" id="pauseBtn" onclick="game.togglePause()" disabled>
        ⏸ PAUSE
      </button>
      <button class="btn btn-ctrl" id="restartBtn" onclick="game.restart()" disabled>
        🔄 RESTART
      </button>
    </div>

    <!-- Mobile D-Pad -->
    <div class="dpad" id="dpad">
      <button class="dpad-btn up" onclick="game.setDirection('up')">▲</button>
      <div class="dpad-middle">
        <button class="dpad-btn left" onclick="game.setDirection('left')">◀</button>
        <div class="dpad-center"></div>
        <button class="dpad-btn right" onclick="game.setDirection('right')">▶</button>
      </div>
      <button class="dpad-btn down" onclick="game.setDirection('down')">▼</button>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>Built with 💚 using HTML5 Canvas &amp; JavaScript</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
